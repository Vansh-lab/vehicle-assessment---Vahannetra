version: "3.9"

services:
  backend:
    build:
      context: ./vehicle_assessment_backend
    environment:
      VAHANNETRA_DATABASE_URL: sqlite:////app/vahannetra.db
      VAHANNETRA_REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - redis

  frontend:
    build:
      context: ./vahannetra_frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://backend:8000
      NEXT_PUBLIC_USE_BACKEND: "true"
    ports:
      - "3000:3000"
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
