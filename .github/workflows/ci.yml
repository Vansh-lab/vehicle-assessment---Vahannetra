name: CI

on:
  push:
    branches: ["main", "master", "copilot/**"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_USER: vahannetra
          POSTGRES_PASSWORD: password
          POSTGRES_DB: vahannetra_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vahannetra -d vahannetra_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: FDA_Project/vehicle_assessment_backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install -r requirements.txt pytest-asyncio pytest-cov
      - name: Enforce DSQ 47-case matrix contract
        run: |
          CASE_COUNT=$(PYTHONPATH=. pytest tests/test_dsq_v2.py --collect-only -q | grep -c "test_dsq_v2_47_case_matrix_contract\\[case")
          echo "Collected DSQ matrix cases: ${CASE_COUNT}"
          test "${CASE_COUNT}" -eq 47
      - name: Run pytest + coverage
        env:
          VAHANNETRA_DATABASE_URL: postgresql://vahannetra:password@localhost:5432/vahannetra_db
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/0
        run: PYTHONPATH=. pytest tests/ -v --asyncio-mode=auto --cov=app --cov=ml

  lint:
    name: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FDA_Project/vehicle_assessment_backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install lint dependencies
        run: python -m pip install -r requirements.txt black ruff
      - name: Black check
        run: black --check app tests
      - name: Ruff check
        run: ruff check app tests

  build:
    name: build
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend docker image
        run: docker build -t vahannetra-backend:ci ./FDA_Project/vehicle_assessment_backend
      - name: Build frontend docker image
        run: docker build -t vahannetra-frontend:ci ./FDA_Project/vahannetra_frontend

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: ECS deploy handoff
        run: |
          echo "Build succeeded. Use deploy-ecs workflow for AWS ECR/ECS rollout + smoke + rollback gates."
