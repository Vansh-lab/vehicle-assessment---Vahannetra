name: CI

on:
  push:
    branches: ["main", "master", "copilot/**"]
  pull_request:
    branches: ["main", "master"]

permissions:
  contents: read

jobs:
  test:
    name: Test (backend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FDA_Project/vehicle_assessment_backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: FDA_Project/vehicle_assessment_backend/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: PYTHONPATH=. pytest -q

  lint:
    name: Lint (frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FDA_Project/vahannetra_frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: FDA_Project/vahannetra_frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  build:
    name: Build (frontend)
    runs-on: ubuntu-latest
    needs: [lint]
    defaults:
      run:
        working-directory: FDA_Project/vahannetra_frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: FDA_Project/vahannetra_frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  deploy:
    name: Deploy (placeholder)
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Deploy placeholder
        run: echo "Deployment stage scaffold is ready."
