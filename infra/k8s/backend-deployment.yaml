apiVersion: apps/v1
kind: Deployment
metadata:
  name: vahannetra-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vahannetra-backend
  template:
    metadata:
      labels:
        app: vahannetra-backend
    spec:
      containers:
        - name: backend
          image: vahannetra-backend:latest
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: vahannetra-backend
spec:
  selector:
    app: vahannetra-backend
  ports:
    - port: 8000
      targetPort: 8000
